
services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.3.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000

  kafka:
    image: confluentinc/cp-kafka:7.3.0
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1

  mysql:
    image: mysql:8.0
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: threat_intel

  mock-threat-api:
    build: ./mock-threat-api
    ports:
      - "8081:8081"
    environment:
      # Set THREAT_SOURCE_MODE to one of: mock, real, hybrid
      # mock (default) = Use simulated threat data
      # real = Fetch from real AbuseIPDB and AlienVault APIs (requires API keys below)
      # hybrid = Try real APIs, fallback to simulated data if unavailable
      THREAT_SOURCE_MODE: ${THREAT_SOURCE_MODE:-mock}
      
      # AbuseIPDB API Configuration
      # Get your FREE API key from: https://www.abuseipdb.com/register
      ABUSEIPDB_API_KEY: ${ABUSEIPDB_API_KEY:-}
      
      # AlienVault OTX API Configuration
      # Get your FREE API key from: https://otx.alienvault.com/
      ALIENVAULT_API_KEY: ${ALIENVAULT_API_KEY:-}

  mock-ranking-api:
    build: ./mock-ranking-api
    ports:
      - "8082:8082"

  ingestion-service:
    build: ./ingestion-service
    ports:
      - "8083:8083"
    depends_on:
      - kafka
      - mock-threat-api

  extraction-service:
    build: ./extraction-service
    ports:
      - "8084:8084"
    depends_on:
      - kafka
      - kafka-producer-service

  kafka-producer-service:
    build: ./kafka-producer-service
    ports:
      - "8085:8085"
    depends_on:
      - kafka

  kafka-consumer-processing:
    build: ./kafka-consumer-processing
    ports:
      - "8086:8086"
    depends_on:
      - kafka
      - ranking-service

  ranking-service:
    build: ./ranking-service
    ports:
      - "8087:8087"
    depends_on:
      - mock-ranking-api

  database-service:
    build: ./database-service
    ports:
      - "8088:8088"
    depends_on:
      - kafka
      - mysql
